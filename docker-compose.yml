services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      WAYFINDER_ARCHITECTURE_SCANNER: ${WAYFINDER_ARCHITECTURE_SCANNER:-placeholder}
      WAYFINDER_ENTRY_SCANNER: ${WAYFINDER_ENTRY_SCANNER:-placeholder}
      WAYFINDER_VERIFIER_RUNNER: ${WAYFINDER_VERIFIER_RUNNER:-placeholder}
      WAYFINDER_START_PROJECT5_HTTP_MCP: ${WAYFINDER_START_PROJECT5_HTTP_MCP:-0}
      WAYFINDER_PROJECT5_REPO_MAPPER_MCP_URL: ${WAYFINDER_PROJECT5_REPO_MAPPER_MCP_URL:-http://127.0.0.1:8101/mcp}
      WAYFINDER_PROJECT5_AST_EXPLORER_MCP_URL: ${WAYFINDER_PROJECT5_AST_EXPLORER_MCP_URL:-http://127.0.0.1:8102/mcp}
      WAYFINDER_ENABLE_GITHUB_INGESTION: ${WAYFINDER_ENABLE_GITHUB_INGESTION:-0}
      WAYFINDER_GITHUB_REPO_ALLOWLIST: ${WAYFINDER_GITHUB_REPO_ALLOWLIST:-langchain-ai/langchain,LovRanRan/wayfinder}
      WAYFINDER_GITHUB_MAX_FILES: ${WAYFINDER_GITHUB_MAX_FILES:-10000}
      WAYFINDER_GITHUB_CACHE_ROOT: ${WAYFINDER_GITHUB_CACHE_ROOT:-/repo-cache/repos}
      WAYFINDER_TEST_SANDBOX_URL: ${WAYFINDER_TEST_SANDBOX_URL:-http://sandbox-worker:8110}
      WAYFINDER_TEST_SANDBOX_TOKEN: ${WAYFINDER_TEST_SANDBOX_TOKEN:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-wayfinder-local}
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/data
      - repo-cache:/repo-cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox-worker:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    environment:
      WAYFINDER_SANDBOX_ALLOWED_ROOTS: /repo-cache/repos
      WAYFINDER_SANDBOX_TEMP_ROOT: /tmp/wayfinder-sandbox
      WAYFINDER_SANDBOX_TOKEN: ${WAYFINDER_TEST_SANDBOX_TOKEN:-}
      WAYFINDER_SANDBOX_MAX_OUTPUT_BYTES: ${WAYFINDER_SANDBOX_MAX_OUTPUT_BYTES:-12000}
    ports:
      - "8110:8110"
    volumes:
      - repo-cache:/repo-cache:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8110/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      WAYFINDER_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_WAYFINDER_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  mcp-repo-mapper:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    profiles: ["mcp"]
    working_dir: /workspace
    volumes:
      - ../project5/mcp-repo-mapper:/workspace:ro
    command: ["uv", "run", "mcp-repo-mapper"]
    stdin_open: true
    tty: true

  mcp-ast-explorer:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    profiles: ["mcp"]
    working_dir: /workspace
    volumes:
      - ../project5/mcp-ast-explorer:/workspace:ro
    command: ["uv", "run", "mcp-ast-explorer"]
    stdin_open: true
    tty: true

  mcp-test-runner:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    profiles: ["mcp"]
    working_dir: /workspace
    volumes:
      - ../project5/mcp-test-runner:/workspace:ro
    command: ["uv", "run", "mcp-test-runner"]
    stdin_open: true
    tty: true

volumes:
  sqlite-data:
  repo-cache:
